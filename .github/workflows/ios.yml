name: iOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild \
            -project PresentationTimer.xcodeproj \
            -scheme PresentationTimer \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -quiet \
            test
